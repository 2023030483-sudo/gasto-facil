<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Escanear Ticket — Gasto Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <!-- Ionic Core (Web Components) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0456C5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Gasto Fácil" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <header class="top-bar">
    <div class="top-bar__left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#0456C5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="top-bar__brand">Gasto Fácil</span>
    </div>
    <div class="top-bar__right">
      <span class="top-bar__label">Escanear ticket</span>
    </div>
  </header>

  <main class="main main--scan">
    <section class="viewfinder">
      <div class="viewfinder__frame" id="cameraPreview">
        <video id="videoEl" autoplay playsinline muted></video>
        <canvas id="canvasEl" style="display:none"></canvas>
        <div class="viewfinder__overlay"></div>
        <div class="scan-box">
          <span class="scan-box__line" id="scanLine"></span>
          <span class="corner corner--tl"></span>
          <span class="corner corner--tr"></span>
          <span class="corner corner--bl"></span>
          <span class="corner corner--br"></span>
        </div>
        <div class="viewfinder__hint">
          <span>Alinea el ticket con el recuadro</span>
        </div>
      </div>

      <div class="camera-controls">
        <button class="btn btn--primary btn--icon-left" id="btnCapture" type="button">
          <svg width="20" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M16 2h2a2 2 0 0 1 2 2v2M8 2H6a2 2 0 0 0-2 2v2M20 16v2a2 2 0 0 1-2 2h-2M4 16v2a2 2 0 0 0 2 2h2"/></svg>
          Tomar foto
        </button>
        <label class="btn btn--outline btn--icon-left" for="fileInput">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0456C5" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Galería
          <input type="file" id="fileInput" accept="image/*" style="display:none" />
        </label>
      </div>
    </section>

    <div class="preview-card" id="previewCard" style="display:none">
      <img id="previewImg" src="" alt="Captura" class="preview-card__img" />
      <div class="preview-card__info">
        <p class="preview-card__name">Captura reciente</p>
        <p class="preview-card__sub" id="previewFileName">ticket.jpg</p>
      </div>
      <button class="btn-icon btn-delete" id="btnRemove" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#BA1A1A" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>

    <button class="btn-analyze" id="btnAnalyze" style="display:none" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0456C5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span id="analyzeText">Analizar con IA</span>
    </button>

    <p class="scan-note">Nuestra IA detectará automáticamente montos, fechas y categorías del ticket.</p>

    <div class="loading-overlay" id="loadingOverlay" style="display:none">
      <div class="loading-spinner"></div>
      <p>Analizando ticket...</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/" class="nav-link" data-page="inicio">
      <svg width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </a>
    <a href="/gastos/" class="nav-link" data-page="gastos">
      <svg width="19" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Gastos</span>
    </a>
    <a href="/escanear/" class="nav-link nav-link--scan" data-page="escanear">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
      <span>Escanear</span>
    </a>
    <a href="/resumen/" class="nav-link" data-page="resumen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Resumen</span>
    </a>
  </nav>

  <script type="module" src="/js/escanear.js"></script>
  <script src="/js/pwa-register.js" defer></script>
</body>
</html>
