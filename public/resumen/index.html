<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Resumen — Gasto Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <!-- Ionic Core (Web Components) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0456C5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Gasto Fácil" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <header class="top-bar">
    <div class="top-bar__left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#0456C5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="top-bar__brand">Gasto Fácil</span>
    </div>
    <div class="top-bar__right"></div>
  </header>

  <main class="main">
    <div class="page-header">
      <h1 class="page-header__title">Resumen</h1>
      <p class="page-header__sub">Análisis de tus finanzas este mes</p>
    </div>

    <div class="summary-card summary-card--resumen">
      <div class="summary-card__blur summary-card__blur--lg"></div>
      <p class="summary-card__eyebrow">TOTAL ACUMULADO</p>
      <h2 class="summary-card__amount summary-card__amount--lg">$<span id="totalMes">0.00</span></h2>
      <div class="summary-card__badge summary-card__badge--glass">
        <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 7l5-6 5 6" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
        <span id="porcentajeCambio">0% más que el mes pasado</span>
      </div>
    </div>

    <div class="chart-card">
      <div class="donut-chart" aria-hidden="true">
        <svg id="donutSvg" viewBox="0 0 200 200" width="192" height="192"></svg>
        <div class="donut-center">
          <span class="donut-center__label">Gastos</span>
          <span class="donut-center__pct">100%</span>
        </div>
      </div>
      <div class="highlight-card">
        <div class="highlight-card__icon">
          <svg width="15" height="20" viewBox="0 0 24 24" fill="none" stroke="#007442" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
        </div>
        <p class="highlight-card__sub">Categoría con más gastos</p>
        <p class="highlight-card__cat"><span id="categoriaTopName">Comida</span> (<span id="categoriaTopPct">0</span>%)</p>
        <div class="progress-bar">
          <div class="progress-bar__fill" id="topProgress" style="width:0%"></div>
        </div>
      </div>
    </div>

    <section class="section">
      <h4 class="section__eyebrow">DESGLOSE POR CATEGORÍA</h4>
      <div id="categoryList" class="expense-list"></div>
      <p id="noData" class="empty-state" style="display:none; margin-top:1rem">Sin gastos este mes</p>
    </section>
  </main>

  <nav class="bottom-nav bottom-nav--five">
    <a href="/" class="nav-link" data-page="inicio">
      <svg width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </a>
    <a href="/gastos/" class="nav-link" data-page="gastos">
      <svg width="19" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Gastos</span>
    </a>
    <a href="/escanear/" class="nav-link nav-link--scan" data-page="escanear">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
      <span>Escanear</span>
    </a>
    <a href="/resumen/" class="nav-link" data-page="resumen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Resumen</span>
    </a>
    <a href="/presupuesto/" class="nav-link" data-page="presupuesto">
      <svg width="19" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7V5a2 2 0 0 0-2-2H5a3 3 0 0 0 0 6h15v10a2 2 0 0 1-2 2H5a3 3 0 0 1-3-3V6"/><path d="M16 13h4"/></svg>
      <span>Presupuesto</span>
    </a>
  </nav>

  <script type="module" src="/js/resumen.js"></script>
  <script type="module" src="/js/presupuesto-alertas.js?v=2"></script>
  <script src="/js/pwa-register.js" defer></script>
</body>
</html>
