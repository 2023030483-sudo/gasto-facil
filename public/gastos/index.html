<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mis Gastos — Gasto Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0456C5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <header class="top-bar">
    <div class="top-bar__left">
      <a href="/" class="btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </a>
      <span class="top-bar__page-title">Mis Gastos</span>
    </div>
    <div class="top-bar__right"></div>
  </header>

  <main class="main">
    <div class="page-header">
      <h1 class="page-header__title">Mis gastos</h1>
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C3C6D6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <form method="GET" action="/gastos/" style="flex:1">
          <input type="text" name="busqueda" class="search-input" placeholder="¿En qué gastaste hoy?" value="" />
        </form>
      </div>
    </div>

    <div class="filters-scroll">
      <a href="/gastos/?categoria=Todos" class="filter-btn filter-date" data-category="Todos">
        <svg width="13" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Fecha
      </a>
      <div class="filter-divider"></div>
      <a href="/gastos/?categoria=Todos" class="filter-btn" data-category="Todos">Todos</a>
      <a href="/gastos/?categoria=Comida" class="filter-btn" data-category="Comida">Comida</a>
      <a href="/gastos/?categoria=Transporte" class="filter-btn" data-category="Transporte">Transporte</a>
      <a href="/gastos/?categoria=Servicios" class="filter-btn" data-category="Servicios">Servicios</a>
      <a href="/gastos/?categoria=Salud" class="filter-btn" data-category="Salud">Salud</a>
      <a href="/gastos/?categoria=Entretenimiento" class="filter-btn" data-category="Entretenimiento">Entretenimiento</a>
      <a href="/gastos/?categoria=Otros" class="filter-btn" data-category="Otros">Otros</a>
    </div>

    <div id="pageError" class="error-message" style="display:none; margin-bottom:1rem; color:#BA1A1A"></div>

    <div id="expensesList" class="expense-list expense-list--full"></div>

    <div id="emptyState" class="empty-state empty-state--center" style="display:none">
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C3C6D6" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <p>¿No encuentras lo que buscas?</p>
      <a href="/gastos/?categoria=Todos" class="link-blue">Revisar otros meses</a>
    </div>
  </main>

  <a href="/gastos/nuevo/" class="fab">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </a>

  <nav class="bottom-nav">
    <a href="/" class="nav-link" data-page="inicio">
      <svg width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </a>
    <a href="/gastos/" class="nav-link" data-page="gastos">
      <svg width="19" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Gastos</span>
    </a>
    <a href="/escanear/" class="nav-link nav-link--scan" data-page="escanear">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
      <span>Escanear</span>
    </a>
    <a href="/resumen/" class="nav-link" data-page="resumen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Resumen</span>
    </a>
  </nav>

  <script type="module" src="/js/gastos.js"></script>
  <script src="/js/pwa-register.js" defer></script>
</body>
</html>
