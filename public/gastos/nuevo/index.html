<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Nuevo Gasto — Gasto Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <!-- Ionic Core (Web Components) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0456C5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Gasto Fácil" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <header class="top-bar">
    <div class="top-bar__left">
      <a href="/gastos/" class="btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </a>
      <span class="top-bar__page-title">Nuevo Gasto</span>
    </div>
    <div class="top-bar__right"></div>
  </header>

  <main class="main main--form">
    <div class="form-card">
      <div class="form-hero">
        <div class="form-hero__gradient"></div>
        <div class="form-hero__content">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        </div>
      </div>

      <form id="expenseForm" class="form">
        <div id="formMessage" class="error-message" style="display:none; margin-bottom:1rem"></div>
        <div class="form-group">
          <label class="form-label">Concepto</label>
          <input type="text" name="concepto" class="form-input" placeholder="¿En qué gastaste hoy?" required />
        </div>
        <div class="form-group">
          <label class="form-label">Monto</label>
          <div class="amount-input-wrapper">
            <span class="amount-prefix">$</span>
            <input type="number" name="monto" step="0.01" min="0" class="form-input amount-input" placeholder="0.00" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group--half">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" class="form-input" value="" required />
          </div>
          <div class="form-group form-group--half">
            <label class="form-label">Categoría</label>
            <select name="categoria" class="form-input form-select">
              <option value="Comida">Comida</option>
              <option value="Transporte">Transporte</option>
              <option value="Servicios">Servicios</option>
              <option value="Salud">Salud</option>
              <option value="Entretenimiento">Entretenimiento</option>
              <option value="Otros">Otros</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Método de pago</label>
          <div class="payment-chips">
            <label class="payment-chip"><input type="radio" name="metodo_pago" value="Efectivo" checked /><span>Efectivo</span></label>
            <label class="payment-chip"><input type="radio" name="metodo_pago" value="Tarjeta" /><span>Tarjeta</span></label>
            <label class="payment-chip"><input type="radio" name="metodo_pago" value="Transferencia" /><span>Transferencia</span></label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas</label>
          <textarea name="notas" class="form-input form-textarea" placeholder="Agrega más detalles aquí..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary">Guardar</button>
          <a href="/gastos/" class="btn btn--outline">Cancelar</a>
        </div>
      </form>

      <div class="ai-hint">
        <p class="ai-hint__text">Puedes ingresar el gasto manualmente o escanear un ticket para que la IA lo haga por ti.</p>
        <a href="/escanear/" class="ai-hint__link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0456C5" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
          Escanear ticket
        </a>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/" class="nav-link" data-page="inicio">
      <svg width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </a>
    <a href="/gastos/" class="nav-link" data-page="gastos">
      <svg width="19" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Gastos</span>
    </a>
    <a href="/escanear/" class="nav-link nav-link--scan" data-page="escanear">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
      <span>Escanear</span>
    </a>
    <a href="/resumen/" class="nav-link" data-page="resumen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Resumen</span>
    </a>
  </nav>

  <script type="module" src="/js/nuevo-gasto.js"></script>
  <script src="/js/pwa-register.js" defer></script>
</body>
</html>
